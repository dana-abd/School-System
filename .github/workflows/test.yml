name: CI Test for Students Project

on: push

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          if [ -f "Students/AddStudentData.cs" ]; then
            echo "✅ AddStudentData.cs exists"
          else
            echo "❌ AddStudentData.cs missing"
            exit 1
          fi
          
          if [ -f "Students/AddStudentForm.cs" ]; then
            echo "✅ AddStudentForm.cs exists"
          else
            echo "❌ AddStudentForm.cs missing"
            exit 1
          fi
          
          echo "All required files exist ✅"

      - name: Run validation tests
        run: |
          echo "Running validation tests..."
          
          if grep -q "class AddStudentData" Students/AddStudentData.cs; then
            echo "✅ Test 1 passed: AddStudentData class found"
          else
            echo "❌ Test 1 failed"
            exit 1
          fi
          
          if grep -q "InitializeComponent" Students/AddStudentForm.cs; then
            echo "✅ Test 2 passed: InitializeComponent found"
          else
            echo "❌ Test 2 failed"
            exit 1
          fi
          
          echo "All tests passed ✅"
